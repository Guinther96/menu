[build]
  command = "git clone https://github.com/flutter/flutter.git -b stable --depth 1 && export PATH=\"$PATH:$(pwd)/flutter/bin\" && flutter config --enable-web && flutter pub get && flutter build web --release --base-href /"
  publish = "build/web"

[build.environment]
  FLUTTER_WEB_USE_SKIA = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200